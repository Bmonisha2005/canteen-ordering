<!DOCTYPE html>
<html>
<head>
    <title>Admin Dashboard</title>
    <style>
        body { font-family: Arial; background:#f4f6f9; padding:20px; }
        h1 { text-align:center; }

        .top-bar {
            display:flex;
            justify-content:space-between;
            margin-bottom:20px;
        }

        .btn {
            padding:8px 14px;
            text-decoration:none;
            color:white;
            border-radius:5px;
            margin-right:8px;
        }

        .blue { background:#3498db; }
        .green { background:#27ae60; }
        .red { background:#e74c3c; }
        .orange { background:#f39c12; }

        table {
            width:100%;
            border-collapse:collapse;
            background:white;
        }

        th, td {
            padding:10px;
            border:1px solid #ddd;
            text-align:center;
        }

        th { background:#2c3e50; color:white; }

        tr:hover { background:#f2f2f2; }

        input { padding:6px; }
    </style>
</head>
<body>

<h1>Smart Canteen - Admin Dashboard</h1>

<div class="top-bar">

    <!-- Search -->
    <form method="GET">
        <input type="text" name="token" placeholder="Search by Token">
        <button class="btn green">Search</button>
    </form>

    <div>
        <a href="/dashboard" class="btn blue">All</a>
        <a href="/dashboard?today=1" class="btn blue">Today Orders</a>
        <a href="/report" class="btn orange">Report</a>
        <a href="/logout" class="btn red">Logout</a>
    </div>

</div>

<table>
    <tr>
        <th>ID</th>
        <th>Token</th>
        <th>Date</th>
        <th>Items</th>
        <th>Total ₹</th>
        <th>Payment</th>
        <th>Action</th>
    </tr>

    {% for order in orders %}
    <tr>
        <td>{{ order.id }}</td>
        <td>{{ order.token }}</td>
        <td>{{ order.date }}</td>
        <td>{{ order.item_list }}</td>
        <td>{{ order.total }}</td>
        <td>{{ order.payment }}</td>
        <td>
            <a href="/deliver/{{ order.id }}" class="btn green">Deliver / Bill</a>
        </td>
    </tr>
    {% endfor %}
</table>

</body>
</html>
