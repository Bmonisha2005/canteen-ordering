<!DOCTYPE html>
<html>
<head>
    <title>Order Success - Smart Canteen</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', sans-serif;
        }

        .success-card {
            background: white;
            padding: 50px;
            border-radius: 20px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.3);
            text-align: center;
            width: 450px;
            animation: fadeIn 0.8s ease-in-out;
        }

        .token-number {
            font-size: 48px;
            font-weight: bold;
            color: #198754;
            margin: 20px 0;
        }

        .btn-custom {
            border-radius: 30px;
            padding: 10px 25px;
            font-weight: 500;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .check-icon {
            font-size: 60px;
            color: #198754;
        }
    </style>
</head>
<body>

<div class="success-card">

    <div class="check-icon">
        ✔
    </div>

    <h2 class="mt-3 text-success">Order Placed Successfully!</h2>
    <p class="text-muted">Please show this token at the counter</p>

    <div class="token-number">
        {{ token }}
    </div>

    <a href="/menu" class="btn btn-primary btn-custom mt-3">
        Order More
    </a>

</div>

</body>
</html>
