<!DOCTYPE html>
<html>
<head>
    <title>UPI Payment</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background:#f4f6f9;
            display:flex;
            justify-content:center;

        .payment-box{
            background:white;
            padding:30px;
            border-radius:10px;
            box-shadow:0 5px 20px rgba(0,0,0,0.2);
            width:400px;
            text-align:center;
        }

        img{
            width:200px;
            margin:20px 0;
        }
    </style>
</head>
<body>

<div class="payment-box">

    <h3>UPI Payment</h3>

    <p> Enter UPI ID</p>

  
    <p><b>UPI ID:</b> smartcanteenupi@okbank</p>

    <form action="/confirm-payment" method="POST">
        <input type="text" name="upi" class="form-control mb-3" placeholder="Enter UPI ID (dummy accepted)">
        <button class="btn btn-success w-100">I Have Paid</button>
    </form>

</div>

</body>
</html>
